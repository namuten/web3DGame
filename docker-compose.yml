version: '3.3'

services:
  # ─── Nginx Reverse Proxy (SSL 종료) ───
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/www/certbot:ro
    depends_on:
      - web3d-client
      - web3d-server
      - web3d-admin
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Certbot (Let's Encrypt 인증서 자동 갱신) ───
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    # 12시간마다 인증서 갱신 체크
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: always

  web3d-client:
    build: ./client
    container_name: web3d-client
    # 포트를 외부에 노출하지 않음 (nginx-proxy를 통해서만 접근)
    expose:
      - "80"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web3d-server:
    build: ./server
    container_name: web3d-server
    # 포트를 외부에 노출하지 않음 (nginx-proxy를 통해서만 접근)
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DB_HOST=220.85.41.214
      - DB_PORT=3306
      - DB_NAME=twdb
      - DB_USER=twuser
      - DB_PASSWORD=${DB_PASSWORD}
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web3d-admin:
    build: ./admin
    container_name: web3d-admin
    # 포트를 외부에 노출하지 않음 (nginx-proxy를 통해서만 접근)
    expose:
      - "80"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  certbot-etc:
  certbot-var:
