# ─── 초기 SSL 인증서 발급용 Nginx 설정 ───
# 인증서가 아직 없을 때 Certbot HTTP-01 챌린지만 처리합니다.
# 인증서 발급 후 nginx.conf로 교체됩니다.

server {
    listen 80;
    server_name namuten.duckdns.org;

    # Certbot 인증 챌린지 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 임시로 클라이언트 프록시 (인증서 발급 전까지 HTTP로 서비스)
    location / {
        proxy_pass http://web3d-client:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
